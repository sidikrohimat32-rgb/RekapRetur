<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring Retur Real-Time</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        .status-badge { padding: 2px 8px; border-radius: 99px; font-size: 9px; font-weight: 800; }
        .bg-transit { background-color: #fef3c7; text-color: #92400e; border: 1px solid #f59e0b; }
        .bg-delivered { background-color: #d1fae5; text-color: #065f46; border: 1px solid #10b981; }
        .sticky-header th { position: sticky; top: 0; background: #f8fafc; z-index: 10; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8 text-slate-800">

    <div class="max-w-[1650px] mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
            <div>
                <h1 class="text-2xl font-black text-blue-900 tracking-tight">📊 Dashboard Pantauan Kurir</h1>
                <p class="text-slate-500 text-[10px] uppercase font-bold tracking-widest">Berdasarkan Status CSV Marketplace</p>
            </div>
            <div class="flex gap-2">
                <button onclick="clearAllData()" class="px-4 py-2 text-[10px] bg-red-50 text-red-600 border border-red-200 rounded-xl font-bold">RESET DATA</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-3 space-y-4">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                    <label class="block text-[10px] font-black mb-2 text-slate-400 uppercase italic">Upload CSV (Shopee/TikTok)</label>
                    <input type="file" id="csvFile" accept=".csv" multiple class="text-xs w-full file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-blue-50 file:text-blue-700 font-bold cursor-pointer">
                </div>

                <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                    <h3 class="text-[10px] font-bold text-slate-400 uppercase mb-4">Ringkasan Status Kurir</h3>
                    <div class="space-y-3">
                        <div class="flex justify-between items-center">
                            <span class="text-xs font-bold text-orange-600">Sedang Transit</span>
                            <span id="countTransit" class="text-xl font-black">0</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-xs font-bold text-green-600">Sampai di Tujuan</span>
                            <span id="countDelivered" class="text-xl font-black">0</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-9">
                <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
                    <div class="overflow-x-auto max-h-[82vh]">
                        <table class="w-full text-left border-collapse">
                            <thead class="sticky-header">
                                <tr class="bg-slate-50 text-[10px] uppercase text-slate-400 font-black">
                                    <th class="p-5 border-b">No. Resi & Pesanan</th>
                                    <th class="p-5 border-b">Detail Produk</th>
                                    <th class="p-5 border-b">Status Kurir</th>
                                    <th class="p-5 border-b">Waktu Terakhir</th>
                                    <th class="p-5 border-b text-center">Fisik (Scan)</th>
                                </tr>
                            </thead>
                            <tbody id="tableBody" class="text-[11px] divide-y divide-slate-100">
                                <tr><td colspan="5" class="p-20 text-center text-slate-300 font-bold">Silakan Upload Data CSV 30 Hari Terakhir</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let rawData = JSON.parse(localStorage.getItem('monitor_data')) || [];

        function saveData() {
            localStorage.setItem('monitor_data', JSON.stringify(rawData));
        }

        function getVal(row, keys) {
            for (let key of keys) {
                const foundKey = Object.keys(row).find(k => k.toLowerCase().trim() === key.toLowerCase());
                if (foundKey && row[foundKey]) return row[foundKey].trim();
            }
            return "-";
        }

        document.getElementById('csvFile').addEventListener('change', function(e) {
            const files = e.target.files;
            Array.from(files).forEach(file => {
                Papa.parse(file, {
                    header: true, skipEmptyLines: true,
                    complete: function(results) {
                        rawData = rawData.concat(results.data);
                        saveData();
                        renderTable();
                    }
                });
            });
        });

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            let transit = 0;
            let delivered = 0;

            // Merge per resi
            const merged = {};
            rawData.forEach(row => {
                const resi = getVal(row, ['No. Resi', 'Tracking Number', 'Tracking ID']);
                if (!merged[resi]) {
                    // Deteksi Status
                    const statusSistem = getVal(row, ['Status Pesanan', 'Order Status', 'Status']);
                    const waktu = getVal(row, ['Waktu Selesai', 'Order Update Time', 'Waktu Kirim']);
                    
                    // Logic Sederhana: Jika status ada kata "Selesai" atau "Sampai", anggap Delivered
                    const isArrived = statusSistem.toLowerCase().includes('selesai') || 
                                     statusSistem.toLowerCase().includes('diterima') ||
                                     statusSistem.toLowerCase().includes('delivered');

                    if(isArrived) delivered++; else transit++;

                    merged[resi] = {
                        resi: resi,
                        orderId: getVal(row, ['ID Pesanan', 'Order ID']),
                        status: statusSistem,
                        waktu: waktu,
                        isArrived: isArrived,
                        product: getVal(row, ['Nama Produk', 'Nama Barang'])
                    };
                }
            });

            Object.values(merged).forEach(item => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50";
                tr.innerHTML = `
                    <td class="p-5 font-bold">
                        <div class="text-blue-900">${item.resi}</div>
                        <div class="text-[9px] text-slate-400 font-mono">${item.orderId}</div>
                    </td>
                    <td class="p-5 text-slate-600">${item.product}</td>
                    <td class="p-5">
                        <span class="status-badge ${item.isArrived ? 'bg-green-100 text-green-700' : 'bg-orange-100 text-orange-700'}">
                            ${item.status}
                        </span>
                    </td>
                    <td class="p-5 font-mono text-slate-500">${item.waktu}</td>
                    <td class="p-5 text-center">
                        <input type="checkbox" class="w-4 h-4 accent-blue-600">
                    </td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('countTransit').innerText = transit;
            document.getElementById('countDelivered').innerText = delivered;
        }

        function clearAllData() {
            if(confirm("Hapus semua riwayat rekap?")) {
                localStorage.clear();
                rawData = [];
                renderTable();
            }
        }

        window.onload = renderTable;
    </script>
</body>
</html>
