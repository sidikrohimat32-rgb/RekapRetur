<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QC Retur JNT ANJING </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        .row-match { background-color: #d1fae5 !important; border-left: 5px solid #10b981; }
        .row-wrong { background-color: #fee2e2 !important; border-left: 5px solid #ef4444; }
        .sticky-header th { position: sticky; top: 0; background: #f8fafc; z-index: 10; }
        .product-item { border-bottom: 1px solid #e2e8f0; padding: 4px 0; }
        .product-item:last-child { border: none; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8 text-slate-800 font-sans">

    <div class="max-w-[1600px] mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
            <div>
                <h1 class="text-2xl font-bold text-blue-900">📦 Smart QC Retur</h1>
                <p class="text-slate-500 text-[10px] uppercase font-bold tracking-widest">Auto-Scan Enabled | Smart Data Merging</p>
            </div>
            <div class="flex items-center gap-3">
                <div class="bg-white border border-slate-200 rounded-xl p-1 flex shadow-sm">
                    <button id="showAllBtn" onclick="setFilter('all')" class="px-4 py-1.5 text-[10px] font-bold rounded-lg bg-blue-600 text-white transition">Tampilkan Per Baris</button>
                    <button id="showUniqueBtn" onclick="setFilter('unique')" class="px-4 py-1.5 text-[10px] font-bold rounded-lg text-slate-500 hover:bg-slate-100 transition">Gabung Resi Double</button>
                </div>
                <button onclick="exportResult()" class="px-5 py-2 text-[10px] bg-green-600 text-white rounded-xl shadow-lg font-bold hover:bg-green-700 transition">DOWNLOAD LAPORAN</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-1 space-y-4">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                    <label class="block text-[10px] font-bold mb-3 text-slate-400 uppercase">Input Data (.csv)</label>
                    <input type="file" id="csvFile" accept=".csv" class="text-xs w-full file:mr-3 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-blue-50 file:text-blue-700 font-semibold">
                </div>

                <div class="bg-blue-900 p-6 rounded-3xl shadow-2xl">
                    <label class="block text-[10px] font-bold mb-3 text-blue-300 uppercase">Scan Resi Disini</label>
                    <input type="text" id="scannerInput" placeholder="Scan..." class="w-full p-4 bg-blue-800 border-none rounded-2xl focus:ring-2 focus:ring-yellow-400 outline-none text-white font-mono placeholder:text-blue-400">
                    <p class="text-[9px] text-blue-300 mt-3 italic">*Scan otomatis merubah status jadi Hijau (Sesuai)</p>
                </div>

                <div class="grid grid-cols-2 gap-3 font-bold text-center">
                    <div class="bg-white p-4 rounded-2xl border-b-4 border-green-500 shadow-sm">
                        <p class="text-[9px] text-slate-400 mb-1">OK</p>
                        <h2 class="text-2xl text-green-600" id="statMatch">0</h2>
                    </div>
                    <div class="bg-white p-4 rounded-2xl border-b-4 border-red-500 shadow-sm">
                        <p class="text-[9px] text-slate-400 mb-1">REJECT</p>
                        <h2 class="text-2xl text-red-600" id="statWrong">0</h2>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-3">
                <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
                    <div class="overflow-x-auto max-h-[78vh]">
                        <table class="w-full text-left border-collapse">
                            <thead class="sticky-header text-[10px] uppercase text-slate-400 font-black">
                                <tr class="bg-slate-50/50 backdrop-blur-md">
                                    <th class="p-5 border-b">Informasi Resi</th>
                                    <th class="p-5 border-b">Daftar Produk (SKU | Variasi)</th>
                                    <th class="p-5 border-b text-center">Total Qty</th>
                                    <th class="p-5 border-b text-center">Status QC</th>
                                    <th class="p-5 border-b">Catatan Admin</th>
                                </tr>
                            </thead>
                            <tbody id="tableBody" class="text-[11px] divide-y divide-slate-100">
                                <tr><td colspan="5" class="p-32 text-center text-slate-300 font-medium">Menunggu file CSV diunggah...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let rawData = [];
        let currentFilter = 'unique'; // Default gabung resi

        function getVal(row, keys) {
            for (let key of keys) {
                const foundKey = Object.keys(row).find(k => k.toLowerCase().trim() === key.toLowerCase());
                if (foundKey && row[foundKey]) return row[foundKey].trim();
            }
            return "-";
        }

        document.getElementById('csvFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            Papa.parse(file, {
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    rawData = results.data;
                    renderTable();
                }
            });
        });

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            let displayData = [];

            if (currentFilter === 'unique') {
                const merged = {};
                rawData.forEach(row => {
                    const trk = getVal(row, ['No. Resi', 'Tracking ID', 'Tracking Number', 'Nomor Resi']);
                    if (!merged[trk]) {
                        merged[trk] = {
                            tracking: trk,
                            orderId: getVal(row, ['ID Pesanan', 'Order ID', 'No. Pesanan']),
                            products: [],
                            totalQty: 0
                        };
                    }
                    merged[trk].products.push({
                        name: getVal(row, ['Nama Produk', 'Product Name', 'Nama Barang']),
                        sku: getVal(row, ['SKU Penjual', 'Seller SKU', 'SKU']),
                        var: getVal(row, ['Variation', 'Variasi', 'Nama Variasi']),
                        qty: parseInt(getVal(row, ['Quantity', 'Jumlah', 'Qty'])) || 0
                    });
                    merged[trk].totalQty += parseInt(getVal(row, ['Quantity', 'Jumlah', 'Qty'])) || 0;
                });
                displayData = Object.values(merged);
            } else {
                displayData = rawData.map(row => ({
                    tracking: getVal(row, ['No. Resi', 'Tracking ID', 'Tracking Number', 'Nomor Resi']),
                    orderId: getVal(row, ['ID Pesanan', 'Order ID', 'No. Pesanan']),
                    products: [{
                        name: getVal(row, ['Nama Produk', 'Product Name', 'Nama Barang']),
                        sku: getVal(row, ['SKU Penjual', 'Seller SKU', 'SKU']),
                        var: getVal(row, ['Variation', 'Variasi', 'Nama Variasi']),
                        qty: parseInt(getVal(row, ['Quantity', 'Jumlah', 'Qty'])) || 0
                    }],
                    totalQty: parseInt(getVal(row, ['Quantity', 'Jumlah', 'Qty'])) || 0
                }));
            }

            displayData.forEach(item => {
                const tr = document.createElement('tr');
                tr.setAttribute('data-resi', item.tracking.toLowerCase());
                tr.className = "hover:bg-slate-50/80 transition-all";
                
                let productHtml = item.products.map(p => `
                    <div class="product-item">
                        <div class="font-bold text-slate-700">${p.name}</div>
                        <div class="text-[9px] text-blue-500 font-mono uppercase">${p.sku} | ${p.var} <span class="text-slate-400">(x${p.qty})</span></div>
                    </div>
                `).join('');

                tr.innerHTML = `
                    <td class="p-5">
                        <div class="font-black text-slate-900 text-xs">${item.tracking}</div>
                        <div class="text-[9px] text-slate-400 font-mono mt-1">${item.orderId}</div>
                    </td>
                    <td class="p-5">${productHtml}</td>
                    <td class="p-5 text-center font-black text-lg text-slate-700">${item.totalQty}</td>
                    <td class="p-5">
                        <div class="flex flex-col gap-1 items-center">
                            <button onclick="markRow(this, 'match')" class="w-full py-1.5 bg-green-50 text-green-700 border border-green-200 rounded-lg text-[9px] font-black hover:bg-green-100">SESUAI</button>
                            <button onclick="markRow(this, 'wrong')" class="w-full py-1.5 bg-red-50 text-red-700 border border-red-200 rounded-lg text-[9px] font-black hover:bg-red-100">SALAH</button>
                        </div>
                    </td>
                    <td class="p-5">
                        <textarea placeholder="Catatan..." class="w-full p-2 bg-transparent border border-slate-200 rounded-xl text-[10px] outline-none focus:ring-1 focus:ring-blue-500 note-input" rows="2"></textarea>
                    </td>
                `;
                tbody.appendChild(tr);
            });
            updateStats();
        }

        function setFilter(type) {
            currentFilter = type;
            const allBtn = document.getElementById('showAllBtn');
            const uniqueBtn = document.getElementById('showUniqueBtn');
            
            allBtn.className = type === 'all' ? "px-4 py-1.5 text-[10px] font-bold rounded-lg bg-blue-600 text-white transition" : "px-4 py-1.5 text-[10px] font-bold rounded-lg text-slate-500 hover:bg-slate-100 transition";
            uniqueBtn.className = type === 'unique' ? "px-4 py-1.5 text-[10px] font-bold rounded-lg bg-blue-600 text-white transition" : "px-4 py-1.5 text-[10px] font-bold rounded-lg text-slate-500 hover:bg-slate-100 transition";
            
            renderTable();
        }

        function markRow(btn, type) {
            const row = btn.closest('tr');
            row.classList.remove('row-match', 'row-wrong');
            if (type === 'match') row.classList.add('row-match');
            else row.classList.add('row-wrong');
            updateStats();
        }

        function updateStats() {
            document.getElementById('statMatch').innerText = document.querySelectorAll('.row-match').length;
            document.getElementById('statWrong').innerText = document.querySelectorAll('.row-wrong').length;
        }

        document.getElementById('scannerInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const val = this.value.trim().toLowerCase();
                const row = document.querySelector(`tr[data-resi="${val}"]`);
                if (row) {
                    row.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    // OTOMATIS JADI HIJAU (Sesuai)
                    row.classList.remove('row-wrong');
                    row.classList.add('row-match');
                    row.classList.add('ring-4', 'ring-yellow-400');
                    setTimeout(() => row.classList.remove('ring-4', 'ring-yellow-400'), 1500);
                    updateStats();
                } else {
                    alert('Resi tidak terdaftar di CSV!');
                }
                this.value = '';
            }
        });

        function exportResult() {
            const rows = document.querySelectorAll('#tableBody tr');
            let csvContent = "Tracking ID,Total Qty,Status QC,Catatan\n";
            rows.forEach(row => {
                if(row.children.length < 5) return;
                const trk = row.children[0].children[0].innerText;
                const qty = row.children[2].innerText;
                let stts = row.classList.contains('row-match') ? "SESUAI" : (row.classList.contains('row-wrong') ? "BERMASALAH" : "BELUM");
                const note = row.querySelector('.note-input').value.replace(/,/g, '|');
                csvContent += `${trk},${qty},${stts},${note}\n`;
            });
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `Rekap_QC_Smart_${new Date().toISOString().split('T')[0]}.csv`;
            link.click();
        }
    </script>
</body>
</html>
