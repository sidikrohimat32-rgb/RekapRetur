<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekap Retur - Fitur Lengkap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        .row-match { background-color: #d1fae5 !important; border-left: 6px solid #10b981; }
        .row-wrong { background-color: #fee2e2 !important; border-left: 6px solid #ef4444; }
        .sticky-header th { position: sticky; top: 0; background: #f8fafc; z-index: 10; }
        .product-item { border-bottom: 1px solid #f1f5f9; padding: 4px 0; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8 text-slate-800">

    <div class="max-w-[1650px] mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
            <div>
                <h1 class="text-2xl font-black text-blue-900 tracking-tight">📦 Rekap Retur & Monitor Kurir</h1>
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Fitur Scan + Status Transit Otomatis</p>
            </div>
            <div class="flex flex-wrap justify-center items-center gap-3">
                <button onclick="clearAllData()" class="px-4 py-2.5 text-[10px] bg-white border border-red-200 text-red-600 rounded-xl font-bold hover:bg-red-50 transition">HAPUS DATA</button>
                <button onclick="exportResult()" class="px-6 py-2.5 text-[10px] bg-green-600 text-white rounded-xl shadow-lg font-black hover:bg-green-700 transition">SIMPAN LAPORAN (.CSV)</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-3 space-y-4">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                    <div class="mb-5">
                        <label class="block text-[10px] font-black mb-2 text-slate-400 uppercase italic underline">Langkah 1: Upload CSV</label>
                        <input type="file" id="csvFile" accept=".csv" multiple class="text-xs w-full file:mr-3 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-blue-50 file:text-blue-700 font-bold cursor-pointer">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black mb-2 text-blue-600 uppercase italic underline">Langkah 2: Scan Resi</label>
                        <input type="text" id="scannerInput" placeholder="Arahkan scanner Disini ..." class="w-full p-4 bg-slate-100 border-2 border-transparent focus:border-blue-500 rounded-2xl outline-none font-mono text-sm shadow-inner">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-white p-5 rounded-3xl border-b-4 border-green-500 shadow-sm text-center">
                        <p class="text-[9px] font-bold text-slate-400 uppercase">Sudah Scan</p>
                        <h2 class="text-3xl font-black text-green-600" id="statMatch">0</h2>
                    </div>
                    <div class="bg-white p-5 rounded-3xl border-b-4 border-red-500 shadow-sm text-center">
                        <p class="text-[9px] font-bold text-slate-400 uppercase">Reject</p>
                        <h2 class="text-3xl font-black text-red-600" id="statWrong">0</h2>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-9">
                <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
                    <div class="overflow-x-auto max-h-[82vh]">
                        <table class="w-full text-left border-collapse">
                            <thead class="sticky-header">
                                <tr class="bg-slate-50 text-[10px] uppercase text-slate-400 font-black">
                                    <th class="p-5 border-b">ID Pesanan & Resi</th>
                                    <th class="p-5 border-b">Produk</th>
                                    <th class="p-5 border-b">Status Kurir (CSV)</th>
                                    <th class="p-5 border-b">Waktu Update</th>
                                    <th class="p-5 border-b">Fisik (QC)</th>
                                    <th class="p-5 border-b">Catatan</th>
                                </tr>
                            </thead>
                            <tbody id="tableBody" class="text-[11px] divide-y divide-slate-100">
                                <tr><td colspan="6" class="p-40 text-center text-slate-300 font-bold">MENUNGGU DATA...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let rawData = JSON.parse(localStorage.getItem('retur_master_data')) || [];
        let scanStates = JSON.parse(localStorage.getItem('retur_scan_states')) || {};

        window.onload = renderTable;

        function saveData() {
            localStorage.setItem('retur_master_data', JSON.stringify(rawData));
            localStorage.setItem('retur_scan_states', JSON.stringify(scanStates));
        }

        function getVal(row, keys) {
            for (let key of keys) {
                const foundKey = Object.keys(row).find(k => k.toLowerCase().trim() === key.toLowerCase());
                if (foundKey && row[foundKey]) return row[foundKey].trim();
            }
            return "-";
        }

        document.getElementById('csvFile').addEventListener('change', function(e) {
            const files = e.target.files;
            Array.from(files).forEach(file => {
                Papa.parse(file, {
                    header: true, skipEmptyLines: true,
                    complete: function(results) {
                        rawData = rawData.concat(results.data);
                        saveData();
                        renderTable();
                    }
                });
            });
            this.value = '';
        });

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            if (rawData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="p-40 text-center text-slate-300 font-bold">DATA KOSONG</td></tr>';
                return;
            }

            const merged = {};
            rawData.forEach(row => {
                const trk = getVal(row, ['No. Resi', 'Tracking Number', 'Tracking ID', 'Nomor Resi']);
                if (!merged[trk]) {
                    merged[trk] = {
                        resi: trk,
                        orderId: getVal(row, ['ID Pesanan', 'Order ID', 'No. Pesanan']),
                        marketStatus: getVal(row, ['Status Pesanan', 'Order Status', 'Status']),
                        updateTime: getVal(row, ['Waktu Selesai', 'Order Update Time', 'Waktu Status']),
                        products: []
                    };
                }
                merged[trk].products.push({
                    name: getVal(row, ['Nama Produk', 'Nama Barang']),
                    qty: getVal(row, ['Quantity', 'Jumlah', 'Qty'])
                });
            });

            Object.values(merged).forEach(item => {
                const state = scanStates[item.resi.toLowerCase()] || "";
                const tr = document.createElement('tr');
                tr.setAttribute('data-resi', item.resi.toLowerCase());
                tr.className = state === 'match' ? 'row-match' : (state === 'wrong' ? 'row-wrong' : 'hover:bg-slate-50 transition-all');

                tr.innerHTML = `
                    <td class="p-5 font-bold">
                        <div>${item.resi}</div>
                        <div class="text-[9px] text-slate-400 font-mono italic">${item.orderId}</div>
                    </td>
                    <td class="p-5">${item.products.map(p => `<div class="product-item">${p.name} (x${p.qty})</div>`).join('')}</td>
                    <td class="p-5">
                        <span class="px-2 py-1 bg-blue-50 text-blue-700 rounded-md font-bold text-[9px] border border-blue-100 uppercase">${item.marketStatus}</span>
                    </td>
                    <td class="p-5 text-slate-500 font-mono">${item.updateTime}</td>
                    <td class="p-5">
                        <div class="flex flex-col gap-1">
                            <button onclick="markRow('${item.resi}', 'match')" class="py-1 px-3 bg-green-50 text-green-700 border border-green-200 rounded-lg text-[9px] font-black hover:bg-green-200">SESUAI</button>
                            <button onclick="markRow('${item.resi}', 'wrong')" class="py-1 px-3 bg-red-50 text-red-700 border border-red-200 rounded-lg text-[9px] font-black hover:bg-red-200">SALAH</button>
                        </div>
                    </td>
                    <td class="p-5">
                        <textarea oninput="saveNote('${item.resi}', this.value)" class="w-full p-2 bg-slate-50 border border-slate-200 rounded-xl text-[10px] outline-none" rows="1">${localStorage.getItem('note_'+item.resi) || ''}</textarea>
                    </td>
                `;
                tbody.appendChild(tr);
            });
            updateStats();
        }

        function markRow(resi, type) {
            scanStates[resi.toLowerCase()] = type;
            saveData();
            renderTable();
        }

        function saveNote(resi, val) {
            localStorage.setItem('note_'+resi, val);
        }

        function updateStats() {
            document.getElementById('statMatch').innerText = Object.values(scanStates).filter(s => s === 'match').length;
            document.getElementById('statWrong').innerText = Object.values(scanStates).filter(s => s === 'wrong').length;
        }

        document.getElementById('scannerInput
